; HJATS 策略配置文件
; 敏感信息（API Key/Secret）请使用 .env 文件

[RealInitPara]
isBackTest = True

[AlgPara]
Code = ETH-USD
Frequency = 15MINS
nHistoryCounts = 100
StrategyName = HJATS_Strategy

[LiveEngine]
; 实盘引擎参数
strategy_interval = 300      ; 策略运行周期（秒），如5分钟=300
monitor_interval = 30        ; 监控查询周期（秒），如30秒
risk_max_daily_loss_pct = 5  ; 每日最大亏损百分比
risk_max_position = 0.05     ; 最大持仓数量（ETH）

[OrderPara]
; 订单参数（留空使用默认值）

[DataBase]
remote = false
user = admin
passwd = 123456
host = 111.229.229.135
port = 27017
authSource = admin

[Dexinfo]
; 建议使用 .env 文件配置 API Key
dexname = binance